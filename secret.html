<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Editor | Advaith S</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secret-page">
    <header class="site-header">
      <a class="brand" href="index.html">AS</a>
      <nav class="nav-links" aria-label="Project editor navigation">
        <a href="index.html#work">Portfolio</a>
        <a href="#added">Added</a>
      </nav>
      <button class="icon-button theme-toggle" type="button" aria-label="Toggle theme">
        <span class="theme-icon" aria-hidden="true"></span>
      </button>
    </header>

    <main class="section editor-shell">
      <section class="editor-panel reveal">
        <p class="eyebrow">Secret Page</p>
        <h1>Add Projects</h1>
        <form class="project-form" data-project-form>
          <label>
            Project name
            <input name="title" type="text" placeholder="Neural Style Lab" required />
          </label>
          <label>
            Description
            <textarea name="description" rows="4" placeholder="What it does, what you used, what makes it sharp." required></textarea>
          </label>
          <label>
            Tech
            <input name="tech" type="text" placeholder="Python, NumPy, TensorFlow" required />
          </label>
          <label>
            Link
            <input name="url" type="url" placeholder="https://github.com/Advaith-Sujith/..." />
          </label>
          <button class="button primary" type="submit">Add Project</button>
        </form>
      </section>

      <section id="added" class="editor-panel reveal">
        <p class="eyebrow">Local Additions</p>
        <h2>Saved Projects</h2>
        <div class="project-grid compact" data-extra-project-list></div>
        <button class="button ghost danger" type="button" data-clear-projects>Clear Added Projects</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
